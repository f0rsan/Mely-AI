name: M3 CI Gate

on:
  push:
    branches:
      - main
      - master
      - 'feature/**'
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            Mely-AI/03-Frontend/app/package-lock.json
            Mely-AI/04-Backend/service/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: Mely-AI/03-Frontend/app

      - name: Build frontend
        run: npm run build
        working-directory: Mely-AI/03-Frontend/app

      - name: Run M3 backend smoke + RBAC gate
        run: bash Mely-AI/08-QA/run-m3-gate.sh
