<!DOCTYPE html>

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #52525b; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse-ring { 0%{transform:scale(1);opacity:0.6} 100%{transform:scale(2.2);opacity:0} }
    @keyframes progress-stripe {
      0%{background-position:0 0}
      100%{background-position:40px 0}
    }
    @keyframes waveform {
      0%,100%{transform:scaleY(0.3)} 50%{transform:scaleY(1)}
    }

    .blink-cursor { animation: blink 1s step-end infinite; }
    .spin { animation: spin 1.2s linear infinite; }
    .fade-in { animation: fadeIn 0.2s ease-out; }
    .pulse-dot::after {
      content:'';position:absolute;inset:-3px;border-radius:50%;
      background:currentColor;opacity:0.3;
      animation:pulse-ring 1.8s ease-out infinite;
    }
    .progress-animated {
      background-image: repeating-linear-gradient(
        45deg,
        transparent,transparent 10px,
        rgba(255,255,255,0.05) 10px,rgba(255,255,255,0.05) 20px
      );
      background-size: 40px 40px;
      animation: progress-stripe 0.8s linear infinite;
    }
  </style>
</head>

function MockImage({ idx=0, label="", w="100%", h=80, radius=8 }) {

// ─── Reusable components ───────────────────────────────────────────────────────

function GreenDot() {
  return (
    <span className="relative inline-flex" style={{width:8,height:8}}>
      <span className="absolute inset-0 rounded-full bg-green-400 opacity-40 animate-ping" style={{animationDuration:'2.5s'}}/>
      <span className="relative inline-flex rounded-full bg-green-400" style={{width:8,height:8}}/>
    </span>
  );
}

function LLMBadge({status}) {
  if (status==="训练中") return (
    <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-indigo-950 text-indigo-400 font-medium flex items-center gap-1">
      <IconSpinner size={9}/>训练中
    </span>
  );
  if (status==="未训练") return (
    <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-zinc-700 text-zinc-400 font-medium">未训练</span>
  );
  return <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-green-950 text-green-400 font-medium">{status}</span>;
}

function LoraBadge({status}) {
  if (status==="训练中") return (
    <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-purple-950 text-purple-400 font-medium flex items-center gap-1">
      <IconSpinner size={9}/>训练中
    </span>
  );
  if (status==="未训练") return (
    <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-zinc-700/80 text-zinc-500 font-medium">未训练</span>
  );
  return <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-purple-950 text-purple-300 font-medium">{status}</span>;
}

function SectionLabel({children}) {
  return <p className="text-[11px] font-semibold text-zinc-500 uppercase tracking-widest mb-2">{children}</p>;
}

function ProgressBar({value, color="bg-indigo-500", animated=false}) {
  return (
    <div className="w-full h-1.5 bg-zinc-700/60 rounded-full overflow-hidden">
      <div
        className={`h-full ${color} rounded-full transition-all duration-300 ${animated?"progress-animated":""}`}
        style={{width:`${Math.min(100,value)}%`}}
      />
    </div>
  );
}

// ─── Tab 1: Dataset Assessment ─────────────────────────────────────────────────

function TabDatasetAssessment() {
  const [assessed, setAssessed] = useState(false);
  const [assessing, setAssessing] = useState(false);

  const handleAssess = () => {
    setAssessing(true);
    setTimeout(()=>{setAssessing(false);setAssessed(true);},2000);
  };

  return (
    <div className="space-y-5">
      {/* Upload area */}
      <div className="rounded-xl border border-dashed border-zinc-700 hover:border-zinc-500 transition-colors bg-zinc-900/40 p-6 text-center">
        <div className="w-10 h-10 rounded-xl bg-zinc-800 flex items-center justify-center mx-auto mb-3">
          <IconUpload size={18}/>
        </div>
        <p className="text-sm text-zinc-300 mb-1">拖拽图片或点击选择</p>
        <p className="text-xs text-zinc-600 mb-4">支持 JPG / PNG，建议 512px 以上</p>
        <div className="flex items-center justify-center gap-3">
          <button className="px-4 py-2 rounded-lg bg-zinc-800 hover:bg-zinc-700 text-xs text-zinc-300 transition-colors">
            选择训练图片
          </button>
          <button
            onClick={handleAssess}
            disabled={assessing}
            className="flex items-center gap-1.5 px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-xs text-white font-medium transition-colors"
          >
            {assessing ? <><IconSpinner size={11}/>评估中…</> : "开始评估"}
          </button>
        </div>
      </div>

      {assessed && (
        <div className="space-y-4 fade-in">
          {/* Score cards */}
          <div className="grid grid-cols-4 gap-3">
            {[
              {label:"质量分",value:"87",unit:"/100",color:"text-green-400"},
              {label:"总数量",value:"12",unit:"张",color:"text-zinc-200"},
              {label:"合格数",value:"10",unit:"张",color:"text-green-400"},
              {label:"问题数",value:"2",unit:"张",color:"text-yellow-400"},
            ].map(item=>(
              <div key={item.label} className="rounded-xl border border-zinc-700/60 bg-zinc-800/30 px-4 py-3 text-center">
                <div className={`text-2xl font-bold ${item.color}`}>{item.value}<span className="text-sm font-normal text-zinc-500 ml-1">{item.unit}</span></div>
                <p className="text-[11px] text-zinc-500 mt-1">{item.label}</p>
              </div>
            ))}
          </div>

          {/* Angle coverage */}
          <div className="rounded-xl border border-zinc-700/60 bg-zinc-800/20 p-4">
            <SectionLabel>角度覆盖</SectionLabel>
            <div className="space-y-2">
              {[
                {label:"正面",count:4,max:4},
                {label:"3/4侧",count:3,max:4},
                {label:"侧面",count:2,max:4},
                {label:"特写",count:1,max:4},
              ].map(a=>(
                <div key={a.label} className="flex items-center gap-3">
                  <span className="text-xs text-zinc-400 w-12 shrink-0">{a.label}</span>
                  <div className="flex-1 h-1.5 bg-zinc-700 rounded-full overflow-hidden">
                    <div className="h-full bg-indigo-500 rounded-full" style={{width:`${(a.count/a.max)*100}%`}}/>
                  </div>
                  <span className="text-xs text-zinc-500 font-mono w-8 text-right">{a.count}张</span>
                </div>
              ))}
            </div>
          </div>

          {/* Suggestions */}
          <div className="rounded-xl border border-yellow-700/30 bg-yellow-950/10 p-4">
            <SectionLabel>改进建议</SectionLabel>
            <ul className="space-y-1.5">
              <li className="flex items-start gap-2 text-xs text-yellow-400/80"><span className="mt-0.5 shrink-0">⚠</span>建议增加背面角度图片，目前缺少背面视角参考</li>
              <li className="flex items-start gap-2 text-xs text-yellow-400/80"><span className="mt-0.5 shrink-0">⚠</span>2张图片分辨率低于 512px，建议替换为高清版本</li>
              <li className="flex items-start gap-2 text-xs text-zinc-500"><span className="mt-0.5 shrink-0">ℹ</span>可适当增加特写细节图以提升细节训练效果</li>
            </ul>
          </div>

          {/* Recommended mode */}
          <div className="rounded-xl border border-indigo-700/40 bg-indigo-950/20 px-4 py-3 flex items-center justify-between">
            <div>
              <p className="text-xs font-medium text-indigo-300">推荐训练模式</p>
              <p className="text-xs text-zinc-400 mt-0.5">标准模式 · 1500 steps · rank 16</p>
            </div>
            <button className="px-3 py-1.5 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-xs text-white font-medium transition-colors">
              应用此模式
            </button>
          </div>
        </div>
      )}
    </div>

// ─── Tab 4: Training Progress ──────────────────────────────────────────────────

function TabTrainingProgress() {
  const [progress, setProgress] = useState(42);
  const [step, setStep] = useState(630);
  const [loss, setLoss] = useState(0.2514);
  const [logs, setLogs] = useState(SAMPLE_LOGS);
  const [running, setRunning] = useState(true);
  const logsRef = useRef(null);
  const timerRef = useRef(null);

  useEffect(()=>{
    if (!running) return;
    timerRef.current = setInterval(()=>{
      setProgress(p=>{
        if (p>=100){clearInterval(timerRef.current);setRunning(false);return 100;}
        return p+0.4;
      });
      setStep(s=>s+2);
      setLoss(l=>Math.max(0.08,l-0.0003));
      setLogs(prev=>[...prev.slice(-20),
        `2026-04-03 14:${String(21+Math.floor(Date.now()/60000)%10).padStart(2,'0')}:${String(Math.floor(Date.now()/1000)%60).padStart(2,'0')} [STEP] step=${step}/1500 loss=${loss.toFixed(4)}`
      ]);
    },800);
    return ()=>clearInterval(timerRef.current);
  },[running,step,loss]);

  useEffect(()=>{
    if (logsRef.current) logsRef.current.scrollTop=logsRef.current.scrollHeight;
  },[logs]);

  return (
    <div className="space-y-4">
      <div className={`rounded-xl border px-5 py-4 space-y-3 ${running?"border-indigo-700/50 bg-indigo-950/15":"border-green-700/50 bg-green-950/15"}`}>
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-2.5">
            {running
              ? <span className="flex items-center gap-1.5 text-xs px-2 py-0.5 rounded-full bg-indigo-900/60 border border-indigo-700/60 text-indigo-300 font-medium"><IconSpinner size={10}/>训练中</span>
              : <span className="text-xs px-2 py-0.5 rounded-full bg-green-900/60 border border-green-700/60 text-green-300 font-medium">已完成</span>
            }
            <span className="text-xs text-zinc-400">标准模式 · LoRA rank=16</span>
          </div>
          {running && (
            <button
              onClick={()=>{clearInterval(timerRef.current);setRunning(false);}}
              className="text-xs text-zinc-500 hover:text-red-400 transition-colors px-2 py-1 rounded hover:bg-zinc-800"
            >
              取消训练
            </button>
          )}
        </div>
        <ProgressBar value={progress} animated={running}/>
        <div className="flex items-center gap-4 text-xs text-zinc-400 font-mono">
          <span className={running?"text-indigo-300":"text-green-300"}>{Math.floor(progress)}%</span>
          <span className="text-zinc-600">·</span>
          <span>{step} / 1500 steps</span>
          <span className="text-zinc-600">·</span>
          <span>loss {loss.toFixed(4)}</span>
          {running && <><span className="text-zinc-600">·</span><span>约 {Math.max(1,Math.round((100-progress)*0.4))} 分钟</span></>}
        </div>
      </div>

      <div>
        <SectionLabel>实时日志</SectionLabel>
        <div
          ref={logsRef}
          className="rounded-xl bg-zinc-900 border border-zinc-700/60 p-3 h-40 overflow-y-auto font-mono text-[11px] text-zinc-400 space-y-0.5"
        >
          {logs.map((l,i)=>(
            <div key={i} className={l.includes("[STEP]")?"text-zinc-400":l.includes("[INFO]")?"text-zinc-500":"text-zinc-300"}>{l}</div>
          ))}
          {running && <span className="blink-cursor inline-block w-1.5 h-3 bg-zinc-500 ml-0.5"/>}
        </div>
      </div>
    </div>
  );
}

function TabExport() {
  const [checks, setChecks] = useState({info:true,refs:true,dna:true,costumes:true});
  const [selRefs, setSelRefs] = useState(new Set([0,2]));
  const [exporting, setExporting] = useState(false);
  const [exportProgress, setExportProgress] = useState(0);
  const [done, setDone] = useState(false);

  const toggleCheck = k => setChecks(c=>({...c,[k]:!c[k]}));
  const toggleRef = i => setSelRefs(prev=>{const n=new Set(prev);n.has(i)?n.delete(i):n.add(i);return n;});

  const handleExport = () => {
    setExporting(true); setDone(false); setExportProgress(0);
    const t = setInterval(()=>{
      setExportProgress(p=>{
        if(p>=100){clearInterval(t);setExporting(false);setDone(true);return 100;}
        return p+5;
      });
    },120);
  };

  const checkItems = [
    {key:"info",label:"角色基础信息（姓名/DNA/简介）"},
    {key:"refs",label:"参考图（已选）"},
    {key:"dna",label:"DNA 参数与完整 Prompt"},
    {key:"costumes",label:"造型版本列表"},
  ];

  return (
    <div className="space-y-5">
      <div>
        <SectionLabel>导出内容</SectionLabel>
        <div className="space-y-2">
          {checkItems.map(item=>(
            <label key={item.key} className="flex items-center gap-3 rounded-lg border border-zinc-700/60 bg-zinc-800/20 px-4 py-2.5 cursor-pointer hover:border-zinc-600 transition-colors">
              <input type="checkbox" checked={checks[item.key]} onChange={()=>toggleCheck(item.key)} className="w-4 h-4 accent-indigo-500 shrink-0"/>
              <span className="text-sm text-zinc-300">{item.label}</span>
            </label>
          ))}
        </div>
      </div>

      <div>
        <SectionLabel>选择参考图</SectionLabel>
        <div className="grid grid-cols-4 gap-2">
          {[0,1,2,3].map(i=>(
            <button
              key={i}
              onClick={()=>toggleRef(i)}
              className={`relative rounded-xl overflow-hidden border-2 transition-all ${selRefs.has(i)?"border-indigo-500":"border-transparent hover:border-zinc-600"}`}
            >
              <MockImage idx={i} h={80} radius={0}/>
              {selRefs.has(i) && (
                <div className="absolute top-1.5 right-1.5 w-4 h-4 rounded-full bg-indigo-500 flex items-center justify-center">
                  <IconCheck size={8}/>
                </div>
              )}
            </button>
          ))}
        </div>
      </div>

      <div className="space-y-3">
        <button
          onClick={handleExport}
          disabled={exporting}
          className="flex items-center gap-2 px-5 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-sm text-white font-semibold transition-colors"
        >
          {exporting ? <><IconSpinner size={13}/>导出中…</> : "导出设定书 PDF"}
        </button>

        {(exporting || done) && (
          <div className="fade-in space-y-1.5">
            <ProgressBar value={exportProgress}/>
            {done && (
              <div className="flex items-center gap-2 text-xs text-green-400">
                <IconCheck size={11}/>
                导出完成！文件已保存到桌面
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

                  className={`relative rounded-xl overflow-hidden border-2 transition-all ${selImgs.has(i)?"border-indigo-500":"border-transparent hover:border-zinc-600"}`}>
                  <MockImage idx={i} h={80} radius={0}/>
                  {selImgs.has(i) && <div className="absolute top-1.5 right-1.5 w-4 h-4 rounded-full bg-indigo-500 flex items-center justify-center"><IconCheck size={8}/></div>}
                </button>
              ))}
            </div>
            <button disabled={selImgs.size===0}
              className="px-4 py-1.5 rounded-lg bg-purple-600 hover:bg-purple-500 disabled:opacity-40 text-xs text-white font-medium transition-colors">
              加入训练集 ({selImgs.size} 张)
            </button>
          </div>
        )}
      </div>

      {/* Training config */}
      <div className="space-y-3">
        <SectionLabel>训练配置</SectionLabel>
        <div className="grid grid-cols-2 gap-3">
          {visualModes.map(m=>(
            <button key={m.id} onClick={()=>setMode(m.id)}
              className={`rounded-xl border px-4 py-3 text-left relative transition-all ${mode===m.id?"border-indigo-500 bg-indigo-950/40":"border-zinc-700/60 bg-zinc-800/20 hover:border-zinc-600"}`}>
              {m.rec && <span className="absolute top-2 right-2 text-[9px] px-1 py-0.5 rounded bg-indigo-700/60 text-indigo-300">推荐</span>}
              <p className={`text-sm font-semibold ${mode===m.id?"text-indigo-200":"text-zinc-200"}`}>{m.label}</p>
              <p className="text-xs text-zinc-500 mt-0.5">{m.time} · {m.steps}</p>
              <p className="text-[11px] text-zinc-600">{m.desc}</p>
            </button>
          ))}
        </div>
      </div>

      {/* Current task */}
      <div className="rounded-xl border border-zinc-700/40 bg-zinc-800/20 px-4 py-3 flex items-center justify-between">
        <div>
          <div className="flex items-center gap-2">
            <span className="text-xs px-2 py-0.5 rounded-full bg-zinc-700 text-zinc-400 font-mono">queued</span>
            <span className="text-xs text-zinc-500">视觉 LoRA 训练</span>
          </div>
          <p className="text-[11px] text-zinc-600 mt-1">等待 GPU 资源释放...</p>
        </div>
        <div className="text-right">
          <span className="text-lg font-bold text-zinc-500 font-mono">0%</span>
        </div>
      </div>

      <button className="w-full py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-sm font-semibold text-white transition-colors shadow-lg shadow-indigo-900/30">
        开始视觉训练
      </button>
    </div>
  );
}

// ─── Character Detail (Page 2) ─────────────────────────────────────────────────

function CharacterDetail({charId, onBack}) {
  const [activeTab, setActiveTab] = useState(0);
  const char = CHARACTERS.find(c=>c.id===charId) || CHARACTERS[0];
  const tabBarRef = useRef(null);

  const renderTabContent = () => {
    switch(activeTab) {
      case 0: return <TabDatasetAssessment/>;
      case 1: return <TabTextToChar/>;
      case 2: return <TabDNA/>;
      case 3: return <TabTrainingProgress/>;
      case 4: return <TabGeneration/>;
      case 5: return <TabVoice/>;
      case 6: return <TabCostume/>;
      case 7: return <TabExport/>;
      case 8: return <TabLLMWorkspace char={char}/>;
      case 9: return <TabVisualWorkbench/>;
      default: return null;
    }
  };

  return (
    <div className="flex flex-col h-full">
      {/* Header */}
      <div className="flex items-center gap-4 px-6 py-4 border-b border-zinc-800 bg-zinc-900/50 shrink-0">
        <button
          onClick={onBack}
          className="flex items-center gap-1.5 text-xs text-zinc-500 hover:text-zinc-300 transition-colors px-2 py-1.5 rounded-lg hover:bg-zinc-800"
        >
          <IconBack size={13}/> 返回角色库
        </button>
        <div className="flex items-center gap-2.5">
          <div
            className="w-8 h-8 rounded-xl flex items-center justify-center text-sm font-bold text-white shrink-0"
            style={{background:char.color}}
          >
            {char.initials}
          </div>
          <div>
            <h2 className="text-sm font-bold text-zinc-100">{char.name}</h2>
            <div className="flex items-center gap-2 mt-0.5">
              <LLMBadge status={char.llmStatus}/>
              <LoraBadge status={char.loraStatus}/>
            </div>
          </div>
        </div>
      </div>

      {/* Tab bar */}
      <div
        ref={tabBarRef}
        className="flex border-b border-zinc-800 bg-zinc-900/30 overflow-x-auto shrink-0"
        style={{scrollbarWidth:"none"}}
      >
        {DETAIL_TABS.map((tab,i)=>(
          <button
            key={tab}
            onClick={()=>setActiveTab(i)}
            className={`relative px-4 py-3 text-sm font-medium whitespace-nowrap transition-colors flex-shrink-0 ${activeTab===i?"text-zinc-100":"text-zinc-500 hover:text-zinc-300"}`}
          >
            {tab}
            {activeTab===i && <span className="absolute bottom-0 left-0 right-0 h-0.5 bg-indigo-500 rounded-t-full"/>}
          </button>
        ))}
      </div>

      {/* Tab content */}
      <div className="flex-1 overflow-y-auto p-6">
        {renderTabContent()}
      </div>
    </div>
  );
}

// ─── App Root ──────────────────────────────────────────────────────────────────

function App() {
  const [page, setPage] = useState("library"); // "library" | "detail"
  const [selectedChar, setSelectedChar] = useState(null);

  const handleSelectChar = (id) => {
    setSelectedChar(id);
    setPage("detail");
  };

  const handleBack = () => {
    setPage("library");
    setSelectedChar(null);
  };

  return (
    <div className="h-screen bg-zinc-950 text-zinc-200 overflow-hidden" style={{fontFamily:"'Inter',system-ui,sans-serif"}}>
      {page==="library" && (
        <CharacterLibrary onSelect={handleSelectChar}/>
      )}
      {page==="detail" && selectedChar && (
        <CharacterDetail charId={selectedChar} onBack={handleBack}/>
      )}
    </div>
  );
}

// ─── Mount ─────────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
