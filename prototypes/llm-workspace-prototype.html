    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #52525b; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .spin { animation: spin 1.2s linear infinite; }
    .fade-in { animation: fadeIn 0.2s ease-out; }
    .pulse-dot::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.3;
      animation: pulse-ring 1.8s ease-out infinite;
    }
  </style>

function LLMStatusBadge({ status }) {

    return (
      <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-zinc-700 text-zinc-400 font-medium">
        未训练

    return (

    <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-green-950 text-green-400 font-medium">
      {status}
    </span>
  );
}

function QualityBadge({ score }) {
  const color =
    score >= 80 ? "text-green-400 bg-green-950/50 border-green-800/50" :
    score >= 50 ? "text-yellow-400 bg-yellow-950/50 border-yellow-800/50" :
    "text-red-400 bg-red-950/50 border-red-800/50";
  return (
    <span className={`text-[10px] px-1.5 py-0.5 rounded border font-mono ${color}`}>
      质量 {score}%
    </span>
  );
}

    <div className="space-y-4">

// ─── Training Tab ─────────────────────────────────────────────────────────────

const TRAINING_MODES = [
  { id: "light",    label: "轻量",  time: "~15 分钟", steps: "200–400 步",  vramNote: null },
  { id: "standard", label: "标准",  time: "~35 分钟", steps: "400–800 步",  vramNote: null },
  { id: "fine",     label: "精细",  time: "~70 分钟", steps: "800–1500 步", vramNote: "⚠ 需 12GB VRAM" },
];

const PAST_JOBS = [
  { id: "j1", mode: "标准模式", status: "completed", loss: "0.1892", ago: "3天前", error: null },
  { id: "j2", mode: "轻量模式", status: "failed",    loss: null,     ago: "1周前",
    error: "LLM 训练任务已通过预检并入队，但当前环境未接入 Unsloth 训练执行器。" },
];

function TrainingTab() {
  const [selectedDatasets, setSelectedDatasets] = useState(new Set(["ds1", "ds2"]));
  const [mode, setMode] = useState("light");
  const [training, setTraining] = useState(false);
  const [progress, setProgress] = useState(0);
  const [step, setStep] = useState(0);
  const [loss, setLoss] = useState(0.3241);
  const intervalRef = useRef(null);

  const totalSelected = Array.from(selectedDatasets).reduce((s, id) => {
    const d = SAMPLE_DATASETS.find((x) => x.id === id);
    return s + (d ? d.count : 0);
  }, 0);

  const toggleDataset = (id) => {
    setSelectedDatasets((prev) => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
  };

  const handleStart = () => {
    setTraining(true);
    setProgress(0);
    setStep(0);
    setLoss(0.3241);
  };

  const handleCancel = () => {
    setTraining(false);
    setProgress(0);
    setStep(0);
    if (intervalRef.current) clearInterval(intervalRef.current);
  };

  useEffect(() => {
    if (!training) return;
    intervalRef.current = setInterval(() => {
      setProgress((p) => {
        const next = p + Math.random() * 1.5 + 0.3;
        if (next >= 100) {
          clearInterval(intervalRef.current);
          setTraining(false);
          return 100;
        }
        return next;
      });
      setStep((s) => s + Math.floor(Math.random() * 3 + 1));
      setLoss((l) => Math.max(0.08, l - Math.random() * 0.004));
    }, 300);
    return () => clearInterval(intervalRef.current);
  }, [training]);

  const etaMins = training ? Math.max(1, Math.round((100 - progress) * 0.19)) : 0;

  return (
    <div className="space-y-5">
      {training ? (
        /* ── Training in progress ── */
        <div className="space-y-5">
          <div className="rounded-xl border border-indigo-700/60 bg-indigo-950/20 px-4 py-4 space-y-3">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-2">
                <span className="flex items-center gap-1.5 text-xs px-2 py-0.5 rounded-full bg-indigo-900/60 border border-indigo-700/60 text-indigo-300 font-medium">
                  <IconSpinner size={10} />
                  训练中
                </span>
                <span className="text-xs text-zinc-400">
                  {TRAINING_MODES.find((m2) => m2.id === mode)?.label}模式
                </span>
              </div>
              <button
                onClick={handleCancel}
                className="text-xs text-zinc-500 hover:text-red-400 transition-colors px-2 py-1 rounded hover:bg-zinc-800"
              >
                取消
              </button>
            </div>

            {/* Progress bar */}
            <div className="w-full h-1.5 bg-zinc-700/60 rounded-full overflow-hidden">
              <div
                className="h-full bg-gradient-to-r from-indigo-500 to-indigo-400 rounded-full transition-all duration-300"
                style={{ width: `${Math.min(100, progress)}%` }}
              />
            </div>

            {/* Stats row */}
            <div className="flex items-center gap-4 text-xs text-zinc-400 font-mono">
              <span className="text-indigo-300 font-medium">{Math.floor(progress)}%</span>
              <span className="text-zinc-600">·</span>
              <span>{step} / 800 steps</span>
              <span className="text-zinc-600">·</span>
              <span>loss {loss.toFixed(4)}</span>
              <span className="text-zinc-600">·</span>
              <span>约 {etaMins} 分钟</span>
            </div>
          </div>

          {/* Past jobs section */}
          <div className="space-y-2">
            <h3 className="text-[11px] font-semibold text-zinc-500 uppercase tracking-widest">训练记录</h3>
            {PAST_JOBS.map((job) => (
              <div
                key={job.id}
                className="rounded-lg border border-zinc-700/60 bg-zinc-800/20 px-3.5 py-3 space-y-1.5"
              >

        <div className="space-y-5">
          {/* Dataset selector */}
          <div className="space-y-2">
            <h3 className="text-[11px] font-semibold text-zinc-500 uppercase tracking-widest">选择训练数据集</h3>
            <ul className="space-y-1.5">
              {SAMPLE_DATASETS.map((d) => (

                    <input

                      className="w-4 h-4 shrink-0 accent-indigo-500"

                    <span className="text-sm text-zinc-200 flex-1">{d.name}</span>
                    <span className="text-xs text-zinc-500 font-mono shrink-0">{d.count} 条</span>
                  </label>

            </ul>
            {totalSelected > 0 && (
              <p className="text-xs text-zinc-500 pl-1">已选 <span className="text-indigo-400 font-medium">{totalSelected}</span> 条训练样本</p>
            )}
          </div>

          {/* Mode selector */}
          <div className="space-y-2">
            <h3 className="text-[11px] font-semibold text-zinc-500 uppercase tracking-widest">训练模式</h3>
            <div className="grid grid-cols-3 gap-2">
              {TRAINING_MODES.map((m) => (
                <button
                  key={m.id}
                  onClick={() => setMode(m.id)}
                  className={`rounded-xl border px-3.5 py-3 text-left transition-all ${
                    mode === m.id
                      ? "border-indigo-500 bg-indigo-950/40 ring-1 ring-indigo-500/20"
                      : "border-zinc-700/60 bg-zinc-800/20 hover:border-zinc-600"
                  }`}
                >
                  <div className="flex items-center justify-between mb-1">
                    <span className={`text-sm font-semibold ${mode === m.id ? "text-indigo-200" : "text-zinc-300"}`}>
                      {m.label}
                    </span>
                    {mode === m.id && (
                      <span className="w-2 h-2 rounded-full bg-indigo-400" />
                    )}
                  </div>
                  <p className="text-[11px] text-zinc-500">{m.time}</p>
                  <p className="text-[11px] text-zinc-600">{m.steps}</p>
                  {m.vramNote && (
                    <p className="text-[11px] text-yellow-500 mt-1">{m.vramNote}</p>
                  )}
                </button>
              ))}
            </div>
          </div>

          <button
            onClick={handleStart}
            disabled={selectedDatasets.size === 0}
            className="w-full py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-500
                       disabled:opacity-40 disabled:cursor-not-allowed
                       text-sm font-semibold text-white transition-colors shadow-lg shadow-indigo-900/30"
          >
            开始训练
          </button>
        </div>
      )}
    </div>
  );
}

const INITIAL_MESSAGES = [
  { role: "user",      content: "你好！介绍一下自己吧～" },
  { role: "assistant", content: "哦哦！你好哦～！我是星野ミカ！一个来自虚拟次元的女孩✨ 最近在忙直播的事情呢，有什么想聊的嘛？(○´ω`○)" },
  { role: "user",      content: "你有什么特别的口头禅吗？" },
];

const CHAT_SESSIONS = [
  { id: "s1", label: "chat-a1b2c3d4…" },
  { id: "s2", label: "chat-e5f6a7b8…" },
  { id: "s3", label: "chat-c9d0e1f2…" },
];

function ChatTab({ ollamaRunning, selectedModel, setSelectedModel }) {
  const [sessions, setSessions] = useState(CHAT_SESSIONS);
  const [activeSession, setActiveSession] = useState("s1");
  const [messages, setMessages] = useState(INITIAL_MESSAGES);
  const [streaming, setStreaming] = useState(false);
  const [streamText, setStreamText] = useState("");
  const [input, setInput] = useState("");
  const streamRef = useRef(null);
  const bottomRef = useRef(null);

  const modelLabel =
    selectedModel === "base"
      ? "基础模型"
      : selectedModel === "m2"
      ? "私有模型 v2"
      : selectedModel === "m1"
      ? "私有模型 v1"
      : "基础模型";

  const sendMessage = useCallback(() => {
    const text = input.trim();
    if (!text || streaming) return;
    setInput("");
    setMessages((prev) => [...prev, { role: "user", content: text }]);
    setStreaming(true);
    setStreamText("");

    const reply = BOT_REPLIES[Math.floor(Math.random() * BOT_REPLIES.length)];
    let i = 0;
    setTimeout(() => {
      streamRef.current = setInterval(() => {
        i++;
        setStreamText(reply.slice(0, i));
        if (i >= reply.length) {
          clearInterval(streamRef.current);
          setStreaming(false);
          setMessages((prev) => [...prev, { role: "assistant", content: reply }]);
          setStreamText("");
        }
      }, 38);
    }, 500);
  }, [input, streaming]);

  const handleStop = () => {
    if (streamRef.current) clearInterval(streamRef.current);
    if (streamText) {
      setMessages((prev) => [...prev, { role: "assistant", content: streamText }]);
    }
    setStreaming(false);
    setStreamText("");
  };

  const handleKeyDown = (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  };

  useEffect(() => {
    if (bottomRef.current) {
      bottomRef.current.scrollIntoView({ behavior: "smooth" });
    }
  }, [messages, streamText]);

  const newSession = () => {
    const id = `s${Date.now()}`;
    setSessions((prev) => [{ id, label: `chat-${Math.random().toString(36).slice(2, 10)}…` }, ...prev]);
    setActiveSession(id);
    setMessages([]);
  };

  const modelOptions = [
    { id: "base", label: "基础模型", sub: "qwen2.5:7b", current: selectedModel === "base" },
    { id: "m2",   label: "v2 私有模型", sub: "156条训练",  current: selectedModel === "m2" },
    { id: "m1",   label: "v1 私有模型", sub: "42条训练",   current: selectedModel === "m1" },
  ];

  return (
    <div className="flex gap-3 h-full" style={{ minHeight: 0 }}>
      {/* Left: session list */}
      <div className="w-40 flex flex-col gap-1.5 shrink-0">
        <button
          onClick={newSession}
          className="flex items-center justify-center gap-1.5 w-full py-1.5 rounded-lg bg-indigo-600
                     hover:bg-indigo-500 text-xs font-medium text-white transition-colors"
        >
          <IconPlus size={12} />
          新建对话
        </button>
        <div className="space-y-0.5 overflow-y-auto flex-1">
          {sessions.map((s) => (
            <button
              key={s.id}
              onClick={() => setActiveSession(s.id)}
              className={`w-full text-left px-2.5 py-2 rounded-lg text-[11px] truncate transition-colors ${
                activeSession === s.id
                  ? "bg-zinc-700 text-zinc-200"
                  : "text-zinc-500 hover:bg-zinc-800 hover:text-zinc-300"
              }`}
            >
              {s.label}
            </button>
          ))}
        </div>
      </div>

      {/* Middle: chat window */}
      <div className="flex-1 flex flex-col rounded-xl border border-zinc-700/60 bg-zinc-900/50 overflow-hidden min-w-0">
        {/* Chat header */}
        <div className="px-4 py-2.5 border-b border-zinc-800 flex items-center justify-between shrink-0">
          <div className="flex items-center gap-2 min-w-0">
            <span className="text-sm font-medium text-zinc-200 truncate">星野ミカ 对话</span>
            <span className="text-zinc-700">·</span>
            <span className="text-xs text-zinc-500 truncate">{modelLabel}</span>
            <span className="text-zinc-700">·</span>
            <span className="text-xs text-zinc-600">Shift+Enter 换行</span>
          </div>
          <div className="flex items-center gap-1.5 shrink-0">
            {ollamaRunning ? (
              <>
                <GreenDot />
                <span className="text-[11px] text-zinc-500">已就绪</span>
              </>
            ) : (
              <>
                <span className="w-2 h-2 rounded-full bg-yellow-400" />
                <span className="text-[11px] text-yellow-500">Ollama 离线</span>
              </>
            )}
          </div>
        </div>

        {/* Messages */}
        <div className="flex-1 overflow-y-auto px-4 py-4 space-y-4">
          {messages.map((msg, i) => (
            <div key={i} className={`flex ${msg.role === "user" ? "justify-end" : "justify-start"}`}>
              {msg.role === "assistant" && (
                <div
                  className="w-7 h-7 rounded-full flex items-center justify-center shrink-0 mr-2 mt-0.5 text-[11px] font-bold text-white"
                  style={{ background: "#FF6B9D" }}
                >
                  ミ
                </div>
              )}
              <div
                className={`max-w-xs lg:max-w-sm rounded-2xl px-3.5 py-2.5 text-sm leading-relaxed fade-in ${
                  msg.role === "user"
                    ? "bg-indigo-600 text-white rounded-tr-sm"
                    : "bg-zinc-800 text-zinc-200 rounded-tl-sm"
                }`}
              >
                {msg.content}
              </div>
              {msg.role === "user" && (
                <div className="w-7 h-7 rounded-full bg-zinc-600 flex items-center justify-center shrink-0 ml-2 mt-0.5 text-[11px] font-bold text-zinc-200">
                  U
                </div>
              )}
            </div>
          ))}

          {/* Streaming message */}
          {streaming && (
            <div className="flex justify-start fade-in">
              <div
                className="w-7 h-7 rounded-full flex items-center justify-center shrink-0 mr-2 mt-0.5 text-[11px] font-bold text-white"
                style={{ background: "#FF6B9D" }}
              >
                ミ
              </div>
              <div className="max-w-xs lg:max-w-sm rounded-2xl rounded-tl-sm px-3.5 py-2.5 text-sm bg-zinc-800 text-zinc-200 leading-relaxed">
                {streamText || <span className="text-zinc-600">思考中</span>}
                <span className="blink-cursor inline-block w-0.5 h-4 bg-indigo-400 ml-0.5 align-middle" />
              </div>
            </div>
          )}
          <div ref={bottomRef} />
        </div>

        {/* Input area */}
        <div className="px-4 pb-4 pt-2 border-t border-zinc-800 shrink-0">
          <div className="flex items-end gap-2">
            <textarea
              value={input}
              onChange={(e) => setInput(e.target.value)}
              onKeyDown={handleKeyDown}
              disabled={!ollamaRunning}
              placeholder={ollamaRunning ? "输入消息… (Enter 发送，Shift+Enter 换行)" : "Ollama 未运行，无法发送消息"}
              rows={2}
              className="flex-1 resize-none rounded-xl bg-zinc-800 border border-zinc-700 text-sm text-zinc-200
                         placeholder-zinc-600 px-3.5 py-2.5 focus:outline-none focus:border-indigo-500/60
                         transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
            />
            <div className="flex flex-col gap-1.5">
              {streaming ? (
                <button
                  onClick={handleStop}
                  className="w-9 h-9 rounded-xl bg-zinc-700 hover:bg-zinc-600 text-zinc-300 flex items-center justify-center transition-colors"
                  title="停止"
                >
                  <IconStop size={14} />
                </button>
              ) : (
                <button
                  onClick={sendMessage}
                  disabled={!input.trim() || !ollamaRunning}
                  className="w-9 h-9 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white flex items-center justify-center
                             disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
                  title="发送"
                >
                  <IconSend size={14} />
                </button>
              )}
            </div>
          </div>
        </div>
      </div>

      {/* Right: model switcher */}
      <div className="w-44 shrink-0 flex flex-col gap-3">
        <div>
          <h4 className="text-[11px] font-semibold text-zinc-500 uppercase tracking-widest mb-2">使用模型</h4>
          <div className="space-y-1.5">
            {modelOptions.map((opt) => (
              <button
                key={opt.id}
                onClick={() => setSelectedModel(opt.id)}
                className={`w-full text-left rounded-lg border px-2.5 py-2 transition-all ${
                  opt.current
                    ? "border-indigo-500/60 bg-indigo-950/30"
                    : "border-zinc-700/60 bg-zinc-800/20 hover:border-zinc-600"
                }`}
              >
                <div className="flex items-center justify-between">
                  <span className={`text-[11px] font-medium ${opt.current ? "text-indigo-300" : "text-zinc-300"}`}>
                    {opt.label}
                  </span>
                  {opt.current && <span className="text-[10px] text-indigo-400">●</span>}
                </div>
                <p className="text-[10px] text-zinc-600 mt-0.5">{opt.sub}</p>
              </button>
            ))}
          </div>
        </div>

        <div className="rounded-lg bg-zinc-800/30 border border-zinc-700/40 px-2.5 py-2">
          <p className="text-[10px] text-zinc-500 leading-relaxed">切换模型后下条消息生效</p>
        </div>

        <button className="flex items-center gap-1.5 text-[11px] text-zinc-500 hover:text-zinc-300 transition-colors mt-auto px-1">
          <IconDownload size={11} />
          导出对话 TXT
        </button>
      </div>
    </div>
  );
}

        {/* Top tab bar */}
        <div className="border-b border-zinc-800 flex items-end px-2 bg-zinc-900 shrink-0">
          {TOP_TABS.map((tab, i) => (
            <button
              key={tab}
              onClick={() => setTopTab(i)}
              className={`relative px-4 py-3 text-sm font-medium transition-colors flex items-center gap-1.5 ${
                topTab === i
                  ? "text-zinc-100"
                  : "text-zinc-500 hover:text-zinc-300"
              }`}
            >
              {tab}
              {tab === "LLM 工作台" && (
                <span
                  className="w-1.5 h-1.5 rounded-full shrink-0"
                  style={{ background: "#6366f1" }}
                />
              )}
              {topTab === i && (
                <span className="absolute bottom-0 left-0 right-0 h-0.5 bg-indigo-500 rounded-t-full" />
              )}
            </button>
          ))}
        </div>

        {/* Content area */}
        <div className="flex-1 overflow-hidden p-5 min-h-0">
          {topTab === 7 ? (
            <LLMWorkspace
              ollamaRunning={ollamaRunning}
              onToggleOllama={() => setOllamaRunning((v) => !v)}
            />
          ) : (
            <div className="h-full flex items-center justify-center">
              <div className="text-center space-y-2">
                <p className="text-zinc-600 text-sm font-medium">
                  {TOP_TABS[topTab]}
                </p>
                <p className="text-zinc-700 text-xs">该模块在独立原型中</p>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── Mount ────────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
